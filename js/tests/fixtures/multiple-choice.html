<!DOCTYPE html>
<html><head><meta charset="utf-8"></head><body>
<div id="root"></div>
<script type="module">
import widget from '/src/marimo_learn/static/multiple-choice.js';

const state = {
  question: 'What is 2 + 2?',
  options: ['Three', 'Four', 'Five'],
  correct_answer: 1,
  explanation: 'Two plus two equals four.',
  lang: 'en',
  value: null,
};
const setCalls = [];
const model = {
  get: (k) => state[k],
  set: (k, v) => { state[k] = v; setCalls.push([k, v]); },
  save_changes: () => {},
  on: () => {},
};
window._state = state;
window._setCalls = setCalls;
widget.render({ model, el: document.getElementById('root') });
</script>
</body></html>
