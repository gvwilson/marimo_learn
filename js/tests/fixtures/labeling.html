<!DOCTYPE html>
<html><head><meta charset="utf-8"></head><body>
<div id="root"></div>
<script type="module">
import widget from '/src/marimo_learn/static/labeling.js';

const state = {
  question: 'Label each line of code:',
  labels: ['Variable', 'Function', 'Loop'],
  text_lines: ['x = 5', 'def foo():', 'for i in range(10):'],
  correct_labels: { '0': [0], '1': [1], '2': [2] },
  lang: 'en',
  value: null,
};
const setCalls = [];
const model = {
  get: (k) => state[k],
  set: (k, v) => { state[k] = v; setCalls.push([k, v]); },
  save_changes: () => {},
  on: () => {},
};
window._state = state;
window._setCalls = setCalls;
widget.render({ model, el: document.getElementById('root') });
</script>
</body></html>
