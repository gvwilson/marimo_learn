<!DOCTYPE html>
<html><head><meta charset="utf-8"></head><body>
<div id="root"></div>
<script type="module">
import widget from '/src/marimo_learn/static/flashcard.js';

const state = {
  question: 'Basic Math',
  cards: [
    { front: 'What is 2+2?', back: '4' },
    { front: 'What is 3+3?', back: '6' },
    { front: 'What is 4+4?', back: '8' },
  ],
  shuffle: false,
  lang: 'en',
  value: null,
};
const setCalls = [];
const model = {
  get: (k) => state[k],
  set: (k, v) => { state[k] = v; setCalls.push([k, v]); },
  save_changes: () => {},
  on: () => {},
};
window._state = state;
window._setCalls = setCalls;
widget.render({ model, el: document.getElementById('root') });
</script>
</body></html>
