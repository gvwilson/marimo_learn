site_name: marimo_learn
docs_dir: pages
site_dir: docs

theme:
  name: material

nav:
  - index.md
  - license.md
  - conduct.md
  - contributing.md

plugins:
- mkdocstrings:
    handlers:
      python:
        paths:
          - src

markdown_extensions:
- markdown_include.include:
    base_path: docs
- pymdownx.highlight
- pymdownx.superfences

exclude_docs: >
  *~
